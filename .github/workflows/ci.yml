name: CI

on:
  push:
    # Include main (not just excluded here) so merges actually run CI on
    # main. Without this, main never builds: a merged PR fires a "closed"
    # pull_request event, which isn't in the default trigger types below,
    # so nothing would ever populate the default-branch vcpkg cache that
    # every other branch falls back to on a directory-cache miss.
  pull_request:
    branches:
      - main

# Cancel a still-running CI run for the same branch/PR when a new commit
# lands, instead of letting both runs race to populate the same vcpkg
# cache key (the loser's run wastes ~15 minutes and never benefits from
# the winner's cache since it already started cold).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Windows (primary platform)
  # ──────────────────────────────────────────────
  build-windows:
    name: Windows / MSVC 2026
    # Pinned rather than "windows-latest": that floating label now points at
    # this same Windows Server 2025 + Visual Studio 2026 image anyway (GitHub
    # completed the migration in June 2026), but pinning explicitly means a
    # future floating-label move can't silently break this generator/toolset
    # pairing again the way it did when windows-latest moved off VS2022.
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v5

      - name: Cache Vulkan SDK
        id: vulkan-cache
        uses: actions/cache@v5
        with:
          path: C:\VulkanSDK
          key: vulkan-sdk-windows-1.3.290.0

      - name: Install Vulkan SDK
        if: steps.vulkan-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $version = "1.3.290.0"
          Write-Host "Downloading Vulkan SDK $version..."
          Invoke-WebRequest `
            -Uri "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe" `
            -OutFile "$env:TEMP\VulkanSDK-Installer.exe"
          Write-Host "Installing (silent)..."
          $p = Start-Process "$env:TEMP\VulkanSDK-Installer.exe" `
            -ArgumentList "--accept-licenses","--accept-messages","--confirm-command","install" `
            -Wait -PassThru
          Write-Host "Installer exit code: $($p.ExitCode)"

      - name: Set Vulkan SDK environment
        shell: pwsh
        run: |
          $version = "1.3.290.0"
          echo "VULKAN_SDK=C:\VulkanSDK\$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "C:\VulkanSDK\$version\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 57987637aac17d62bac535bc839baca3754490e6

      - name: Cache vcpkg installed packages
        uses: actions/cache@v5
        with:
          path: build/vcpkg_installed
          # Runner image is baked into the key (not just "windows-x64") so a
          # future toolset change can't restore binaries built by a different
          # MSVC toolset onto the new compiler.
          key: vcpkg-windows-2025-vs2026-x64-${{ hashFiles('vcpkg.json') }}-57987637

      - name: Configure CMake
        # No VCPKG_BINARY_SOURCES override here: keep run-vcpkg's default
        # (clear;x-gha,readwrite) so that if the "Cache vcpkg installed
        # packages" directory cache above misses, vcpkg falls back to its
        # own per-package GitHub Actions binary cache instead of rebuilding
        # every dependency (manifold, clipper2, tbb, imgui, ...) from
        # source — which is what made cold-cache Windows runs take 12+
        # minutes just to configure.
        run: >
          cmake -B build
          -G "Visual Studio 18 2026" -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # ──────────────────────────────────────────────
  # Linux
  # ──────────────────────────────────────────────
  build-linux:
    name: Linux / GCC
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Vulkan SDK and build tools
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt-get update
          sudo apt-get install -y \
            vulkan-sdk \
            ninja-build \
            libxinerama-dev \
            libxcursor-dev \
            xorg-dev \
            libglu1-mesa-dev \
            pkg-config

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 57987637aac17d62bac535bc839baca3754490e6

      - name: Cache vcpkg installed packages
        uses: actions/cache@v5
        with:
          path: build/vcpkg_installed
          key: vcpkg-linux-x64-${{ hashFiles('vcpkg.json') }}-57987637

      - name: Configure CMake
        # See the Windows job's Configure CMake step for why there's no
        # VCPKG_BINARY_SOURCES override here.
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
